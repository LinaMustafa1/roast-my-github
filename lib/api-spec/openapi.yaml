openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: roast
    description: GitHub roast operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /roast:
    post:
      operationId: generateRoast
      tags: [roast]
      summary: Roast a GitHub user
      description: Fetches a user's public GitHub repos and generates a roast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoastInput"
      responses:
        "200":
          description: Roast generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoastResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: GitHub user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RoastInput:
      type: object
      required:
        - username
        - style
      properties:
        username:
          type: string
          description: GitHub username to roast
        style:
          type: string
          enum: [Normal, "Corporate Jargon", Pirate, Haiku]
          description: Roast style
    RoastResult:
      type: object
      required:
        - roast
        - username
      properties:
        roast:
          type: string
          description: The generated roast text
        username:
          type: string
          description: The GitHub username that was roasted
        repoCount:
          type: ["integer", "null"]
          description: Number of public repos
        topLanguages:
          type: array
          items:
            type: string
          description: Most used programming languages
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
